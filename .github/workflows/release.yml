name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ramanujan ${{ github.ref_name }}
          body: |
            ## Ramanujan ${{ github.ref_name }}

            Built by [Avinash Singh](https://github.com/avithehacker)

            ### Download
            | Platform | File |
            |----------|------|
            | macOS Apple Silicon | `Ramanujan-*-arm64-mac.zip` |
            | macOS Intel | `Ramanujan-*-x64-mac.zip` |
            | Windows | `Ramanujan-*-Setup.exe` |
            | Linux | `Ramanujan-*-x86_64.AppImage` |

            ### First run
            Ramanujan sets up a local AI model (Llama 3.2 1B) automatically on first launch.
            Connect GitHub Models or Gemini for free cloud AI, or add Claude/ChatGPT API keys in Settings.

            **macOS**: Unzip → drag to Applications → right-click → Open (first launch only, to bypass Gatekeeper)
            **Windows**: Run the `.exe` installer
            **Linux**: `chmod +x *.AppImage` then run
          files: release-assets/**/*
          draft: false
