name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # ── CLI binaries ───────────────────────────────────────────────────────
      - name: Install CLI deps
        run: npm install
        working-directory: cli

      - name: Build CLI binaries
        run: mkdir -p binaries && npm run package
        working-directory: cli

      # ── VS Code extension ──────────────────────────────────────────────────
      - name: Install VS Code extension deps
        run: npm install
        working-directory: vscode

      - name: Build VS Code extension
        run: npm run build
        working-directory: vscode

      - name: Package VSIX
        run: npx vsce package --no-dependencies
        working-directory: vscode

      # ── GitHub Release (always runs) ───────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cli/binaries/*
            vscode/*.vsix

      # ── npm publish (skips gracefully if NPM_TOKEN not set) ───────────────
      - name: Publish CLI to npm
        continue-on-error: true
        run: npm publish --access public
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── VS Code Marketplace (skips gracefully if VSCE_PAT not set) ────────
      - name: Publish to VS Code Marketplace
        continue-on-error: true
        run: npx vsce publish --no-dependencies
        working-directory: vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
